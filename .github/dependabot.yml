# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
# main branch
  - package-ecosystem: "gomod"
    target-branch: main
    directory: "/"
    schedule:
      interval: "daily"
    labels:
    - dependencies
    groups:
      k8sio:
        patterns:
        - k8s.io/*

  - package-ecosystem: "docker"
    target-branch: main
    directory: "/"
    schedule:
      interval: "daily"
    labels:
    - dependencies

  - package-ecosystem: "github-actions"
    target-branch: main
    directory: "/"
    schedule:
      interval: "daily"
    labels:
    - dependencies
